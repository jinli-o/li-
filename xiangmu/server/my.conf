#my.conf配置文件

# ================= 网络配置 =================
#ip地址
ip 127.0.0.1

#端口
port 6000

#监听队列大小
lismax     4096

# ================= 线程池配置 =================
#线程数目
threadnum 4

#任务队列大小
taskmax 1024

# ================= 数据库配置 =================
#数据库IP地址
db_ip 127.0.0.1

#数据库端口
db_port 3306

#数据库名称
db_name 2501db

#数据库用户名
db_username root

#数据库密码
db_passwd 123456

# ================= 连接池配置 =================
#最小连接数
pool_min_size 5

#最大连接数
pool_max_size 20

# ================= 日志配置 =================
#日志目录
log_dir logs

#是否启用日志（1启用，0禁用）
log_enable 1

#日志级别（DEBUG, INFO, WARNING, ERROR）
log_level INFO